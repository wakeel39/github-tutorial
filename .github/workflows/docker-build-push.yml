name: Docker Build and Push
on:
#   push:
#     branches:
#       - main
 workflow_call:
#  push:
#    branches:
#      - main
jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      

      - name: Build & Push to Docker Hub
        uses: docker/build-push-action@v6
        with:
            context: .
            push: true
            tags: |
                ${{ vars.DOCKERHUB_USER }}/github-tutorial:${{ github.ref_name }}
                ${{ vars.DOCKERHUB_USER }}/github-tutorial:latest
                ${{ vars.DOCKERHUB_USER }}/github-tutorial:${{ github.sha}}


