# Deploy app to server via SSH
# Required secrets: EC2_HOST, EC2_USERNAME, EC2_PRIVATE_KEY
# Add them in repo Settings → Secrets and variables → Actions
name: deploy to server
on:
  workflow_call:
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: SSH to prod server and create devops directory
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_PRIVATE_KEY }}
          port: 22
          script: |
            echo "starting deployment"
            mkdir -p devops
            rm -rf devops/docker-compose.yml

      - name: Copy docker-compose.yml to server
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_PRIVATE_KEY }}
          source: "docker-compose.yml"
          target: "/home/ubuntu/devops/"
          

      - name: ssh to server and run docker-compose up
        uses: appleboy/ssh-action@v1
        with:
            host: ${{ secrets.EC2_HOST }}
            username: ${{ secrets.EC2_USERNAME }}
            key: ${{ secrets.EC2_PRIVATE_KEY }}
            script: |
              echo "deploying app to server"
              sudo apt-get update
              sudo apt-get install -y docker.io docker-compose
              sudo usermod -aG docker $USER
              echo "${{ secrets.DOCKER_PASSWORD }}" | sudo docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
              cd /home/ubuntu/devops
              sudo env DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }} docker-compose down
              sudo env DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }} docker-compose pull
              sudo env DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }} docker-compose up -d --build

      