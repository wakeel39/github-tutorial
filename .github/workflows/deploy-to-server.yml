# Deploy app to server via SSH
# Required secrets: EC2_HOST, EC2_USERNAME, EC2_PRIVATE_KEY
# Add them in repo Settings → Secrets and variables → Actions
name: deploy to server
on:
  workflow_call:
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: SSH to prod server and create devops directory
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_PRIVATE_KEY }}
          port: 22
          script: |
            echo "starting deployment"
            mkdir -p devops

      - name: copy docker-compose.yml to server
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_PRIVATE_KEY }}
          source: docker-compose.yml
          target: /home/ubuntu/devops/docker-compose.yml
          script: |
            echo "deploying app to server composer run"
            sudo apt-get install -y docker.io docker-compose
            sudo usermod -aG $USER newgrp docker
            export DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }}
            sudo docker login -u ${{ secrets.DOCKER_USERNAME }} -p ${{ secrets.DOCKER_PASSWORD }}
            sudo docker-compose down
            sudo docker-compose pull
            sudo docker-compose up -d --build

      - name: ssh to server and run docker-compose up
        uses: appleboy/scp-action@v1
        with:
            host: ${{ secrets.EC2_HOST }}
            username: ${{ secrets.EC2_USERNAME }}
            key: ${{ secrets.EC2_PRIVATE_KEY }}
            script: |
                echo "deploying app to server composer run"
                sudo apt-get update
                sudo apt-get install -y docker.io docker-compose
                sudo usermod -aG $USER newgrp docker
                export DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }}
                sudo docker login -u ${{ secrets.DOCKER_USERNAME }} -p ${{ secrets.DOCKER_PASSWORD }}
                sudo docker-compose down
                sudo docker-compose pull
                sudo docker-compose up -d --build

      