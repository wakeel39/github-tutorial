name: DEVSECOPS END TO END Pipeline
on:
  #workflow_dispatch:
  push:
    branches:
      - main
permissions:
  actions: read
  security-events: write
  contents: read
jobs:
    #ci with security checks
  code-quality:
    uses: ./.github/workflows/code-quality.yml
    secrets: inherit

  secrets-scan:
    uses: ./.github/workflows/secrets-scan.yml
    secrets: inherit

  dependency-scan:
    uses: ./.github/workflows/dependency-scan.yml
    secrets: inherit

  docker-scan:
    uses: ./.github/workflows/docker-lint.yml
    secrets: inherit

#   image-scan:
#     uses: ./.github/workflows/image-scan.yml
#     secrets: inherit
 #cd with build and push to docker hub
  build-and-push:
    needs: [code-quality, secrets-scan, dependency-scan, docker-scan]
    uses: ./.github/workflows/docker-build-push.yml
    secrets: inherit
    
  trivy-scan:
    needs: [build-and-push]
    uses: ./.github/workflows/image-scan.yml
    secrets: inherit

  deploy-to-server:
    uses: ./.github/workflows/deploy-to-server.yml
    secrets: inherit