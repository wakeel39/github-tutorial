# Scan the repo for secrets (API keys, passwords, tokens, etc.)
# Uses Gitleaks - add other options (e.g. TruffleHog) if needed
name: secrets scan
on:
  workflow_dispatch:
  workflow_call:
jobs:
  secrets-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}